<!DOCTYPE html>
<html>

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Starbound Bookstore</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <header>

    <div class="header-top">

      <h1>STARBOUND BOOKSTORE</h1>

      <div class="header-actions">

        <button
          id="favorites-btn"
          title="Favorites"
        >
          ❤
        </button>

        <button
          id="settings-btn"
          title="Settings"
        >
          ⚙
        </button>

        <button
          id="update-btn"
          title="Check for Updates"
        >
          ⭮
        </button>

      </div>

    </div>

    <input
      id="search"
      type="text"
      placeholder="Search books..."
    >

  </header>

  <div id="bookGrid"></div>

  <!-- SETTINGS MODAL -->

  <div id="settings-modal">

    <div id="settings-content">

      <h2>Settings</h2>

      <div class="setting-item">

        <span>Theme</span>

        <button id="theme-toggle">

          Toggle Light/Dark

        </button>

      </div>

      <button id="close-settings">

        Close

      </button>

    </div>

  </div>

  <script src="./script.js"></script>

</body>

</html>
