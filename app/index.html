<!DOCTYPE html>
<html>

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Starbound Bookstore</title>

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

  <!-- HEADER -->

  <header>

    <div class="header-top">

      <h1>STARBOUND BOOKSTORE</h1>

      <div class="header-actions">

        <button
          id="favorites-btn"
          title="Favorites"
        >
          ❤
        </button>

        <button
          id="settings-btn"
          title="Settings"
        >
          ⚙
        </button>

      </div>

    </div>

    <input
      id="search"
      type="text"
      placeholder="Search books..."
    >

  </header>

  <!-- TABS -->

  <div id="tabs">

    <button
      class="tab-btn active"
      id="home-tab"
    >
      Home
    </button>

    <button
      class="tab-btn"
      id="library-tab"
    >
      Library
    </button>

  </div>

  <!-- HOME -->

  <div
    id="home-page"
    class="page active-page"
  >

    <div id="bookGrid"></div>

  </div>

  <!-- LIBRARY -->

  <div
    id="library-page"
    class="page"
  >

    <div id="library-grid"></div>

  </div>

  <!-- SETTINGS -->

  <div id="settings-modal">

    <div id="settings-content">

      <h2>Settings</h2>

      <div class="setting-item">

        <span>Theme</span>

        <button id="theme-toggle">

          Toggle Light/Dark

        </button>

      </div>

      <div class="setting-item">

        <span>Application Updates</span>

        <button id="settings-update-btn">

          Check Updates

        </button>

      </div>

      <div class="setting-item">

        <span>Auto Fullscreen Reader</span>

        <input
          type="checkbox"
          id="fullscreen-toggle"
        >

      </div>

      <div class="setting-item">

        <span>Default Reader Zoom</span>

        <select id="zoom-setting">

          <option value="0.8">
            Small
          </option>

          <option value="1.2">
            Medium
          </option>

          <option value="1.6">
            Large
          </option>

        </select>

      </div>

      <div id="about-app">

        <h3>Starbound Reader</h3>

        <p>Version 1.3.0</p>

      </div>

      <button id="close-settings">

        Close

      </button>

    </div>

  </div>

  <script src="script.js"></script>

</body>

</html>
