<!DOCTYPE html>
<html>

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Starbound Bookstore</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <header>

    <div class="header-top">

      <h1>STARBOUND BOOKSTORE</h1>

      <div class="header-actions">

        <button
          id="library-btn"
          title="Library"
        >
          📚
        </button>

        <button
          id="favorites-btn"
          title="Favorites"
        >
          ❤
        </button>

        <button
          id="settings-btn"
          title="Settings"
        >
          ⚙
        </button>

      </div>

    </div>

    <input
      id="search"
      type="text"
      placeholder="Search books..."
    >

  </header>

  <div id="bookGrid"></div>

  <!-- LIBRARY -->

  <div id="library-modal">

    <div id="library-content">

      <h2>Offline Library</h2>

      <div id="library-grid"></div>

      <button id="close-library">

        Close

      </button>

    </div>

  </div>

  <!-- SETTINGS -->

  <div id="settings-modal">

    <div id="settings-content">

      <h2>Settings</h2>

      <div class="setting-item">

        <span>Theme</span>

        <button id="theme-toggle">

          Toggle Light/Dark

        </button>

      </div>

      <div class="setting-item">

        <span>Application Updates</span>

        <button id="settings-update-btn">

          Check Updates

        </button>

      </div>

      <div class="setting-item">

        <span>Auto Fullscreen Reader</span>

        <input
          type="checkbox"
          id="fullscreen-toggle"
        >

      </div>

      <div class="setting-item">

        <span>Smooth Animations</span>

        <input
          type="checkbox"
          id="animation-toggle"
          checked
        >

      </div>

      <div class="setting-item">

        <span>Default Reader Zoom</span>

        <select id="zoom-setting">

          <option value="0.8">
            Small
          </option>

          <option value="1.2">
            Medium
          </option>

          <option value="1.6">
            Large
          </option>

        </select>

      </div>

      <div class="setting-item">

        <span>Favorites</span>

        <button id="clear-favorites">

          Clear Favorites

        </button>

      </div>

      <div id="about-app">

        <h3>Starbound Reader</h3>

        <p>Version 1.2.0</p>

      </div>

      <button id="close-settings">

        Close

      </button>

    </div>

  </div>

  <script src="./script.js"></script>

</body>

</html>
