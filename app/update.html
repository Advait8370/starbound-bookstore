<!DOCTYPE html>
<html>

<head>

  <title>Updating</title>

  <link rel="stylesheet" href="update.css">

</head>

<body>

  <div id="update-card">

    <h1>
      Starbound Reader

    <p id="status">

    </p>

    <div id="progress-bar">

      </ul>

    </div>

  </div>

  <script src="update.js"></script>

</body>

</html>
