<!DOCTYPE html>
<html>

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Starbound Reader</title>

  <link
    rel="stylesheet"
    href="reader.css"
  >

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

</head>

<body>

  <div id="pdf-container">

    <canvas id="pdf-render"></canvas>

  </div>

  <div id="reader-controls">

    <button id="prev-page">
      ←
    </button>

    <span id="page-info">
      1 / 1
    </span>

    <button id="next-page">
      →
    </button>

    <button id="zoom-out">
      −
    </button>

    <button id="zoom-in">
      +
    </button>

    <button id="fullscreen-btn">
      ⛶
    </button>

    <button id="home-btn">
      ✕
    </button>

  </div>

  <script src="reader.js"></script>

</body>

</html>
